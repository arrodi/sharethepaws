name: aks-selfhosted-deploy

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace
        required: true
        default: sharethepaws
      deploy_postgres:
        description: Deploy CloudNativePG operator + cluster
        required: true
        default: 'true'
      deploy_redis:
        description: Deploy Redis
        required: true
        default: 'true'
      deploy_minio:
        description: Deploy MinIO
        required: true
        default: 'true'

env:
  NAMESPACE: ${{ github.event.inputs.namespace }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Ensure namespace
        run: |
          kubectl apply -f infra/aks/k8s-namespace.yaml
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create app secrets
        run: |
          kubectl -n "$NAMESPACE" create secret generic sharethepaws-secrets \
            --from-literal=postgres-superuser-password='${{ secrets.POSTGRES_SUPERUSER_PASSWORD }}' \
            --from-literal=redis-password='${{ secrets.REDIS_PASSWORD }}' \
            --from-literal=minio-root-user='${{ secrets.MINIO_ROOT_USER }}' \
            --from-literal=minio-root-password='${{ secrets.MINIO_ROOT_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Add Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update

      - name: Deploy CloudNativePG operator
        if: ${{ github.event.inputs.deploy_postgres == 'true' }}
        run: |
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace "$NAMESPACE" \
            --wait

      - name: Deploy PostgreSQL cluster (CloudNativePG CR)
        if: ${{ github.event.inputs.deploy_postgres == 'true' }}
        run: |
          envsubst < infra/aks/postgres-cluster.yaml | kubectl apply -n "$NAMESPACE" -f -

      - name: Deploy Redis
        if: ${{ github.event.inputs.deploy_redis == 'true' }}
        run: |
          helm upgrade --install redis bitnami/redis \
            --namespace "$NAMESPACE" \
            -f infra/aks/values-redis.yaml \
            --wait

      - name: Deploy MinIO
        if: ${{ github.event.inputs.deploy_minio == 'true' }}
        run: |
          helm upgrade --install minio bitnami/minio \
            --namespace "$NAMESPACE" \
            -f infra/aks/values-minio.yaml \
            --set auth.rootUser='${{ secrets.MINIO_ROOT_USER }}' \
            --set auth.rootPassword='${{ secrets.MINIO_ROOT_PASSWORD }}' \
            --wait

      - name: Summary
        run: |
          kubectl -n "$NAMESPACE" get pods
          kubectl -n "$NAMESPACE" get svc
