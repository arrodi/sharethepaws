version: '3.9'
services:
  postgres:
    image: postgres:16.4
    container_name: arrodi_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgresadmin
      POSTGRES_PASSWORD: super_secure_password_987
      POSTGRES_DB: hobbora-db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: sharethepaws_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: sharethepaws_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: super_secure_password_987
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
